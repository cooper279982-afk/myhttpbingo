{{- if .Values.apisix.enabled }}
apiVersion: {{ .Values.apisix.apiVersion }}
kind: ApisixRoute
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: {{ .Values.apisix.ingressClassName }}
  http:
    - name: {{ .Values.name }}
      match:
        hosts:
          - {{ .Values.apisix.host }}
        paths:
          - {{ .Values.apisix.path | quote }}
      backends:
        - serviceName: {{ .Values.name }}
          servicePort: {{ .Values.service.port }}
      plugins:
      - name: request-id
        enable: true
        config:
          request_id_key: x-request-id
          request_id_header: x-request-id
          request_id_header_upstream: x-request-id
          request_id_header_upstream_append: true
          request_id_header_upstream_prefix: x-request-id-
          request_id_header_upstream_suffix: x-request-id-
      - name: limit-count
        enable: true
        config:
          count: 10
          time_window: 60
          rejected_code: 429
          key_type: var
          key: remote_addr
          policy: redis
          redis_host: redis.apisix.svc.cluster.local
          redis_port: 6379
          redis_password: "p@ssw0rd"
          redis_database: 0
          redis_timeout: 1000
{{- end }}
