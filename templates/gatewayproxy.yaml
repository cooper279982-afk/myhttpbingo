{{- if and .Values.apisix.enabled .Values.apisix.gatewayProxy.enabled }}
apiVersion: {{ .Values.apisix.gatewayProxy.apiVersion }}
kind: GatewayProxy
metadata:
  name: {{ .Values.apisix.gatewayProxy.name }}
  namespace: {{ .Values.apisix.gatewayProxy.namespace }}
spec:
  provider:
    type: ControlPlane
    controlPlane:
      mode: {{ .Values.apisix.gatewayProxy.controlPlane.mode }}
      endpoints:
{{- range .Values.apisix.gatewayProxy.controlPlane.endpoints }}
        - {{ . | quote }}
{{- end }}
      tlsVerify: {{ .Values.apisix.gatewayProxy.controlPlane.tlsVerify }}
      auth:
        type: AdminKey
        adminKey:
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apisix.gatewayProxy.controlPlane.adminKeySecret.name }}
              key: {{ .Values.apisix.gatewayProxy.controlPlane.adminKeySecret.key }}
  publishService: {{ .Values.apisix.gatewayProxy.publishService }}
{{- end }}

